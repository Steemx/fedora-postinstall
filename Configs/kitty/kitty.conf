# ==========================================
# Configuración Base de Kitty
# ==========================================

# --- FUENTES ---
# font_family      FiraCode Nerd Font
# bold_font        auto
# italic_font      auto
font_size        11.0

# --- APARIENCIA DE VENTANA ---
background_opacity 0.95
window_padding_width 10
hide_window_decorations yes
confirm_os_window_close 0

# --- COLORES (Estilo oscuro base) ---
# foreground #cdd6f4
#background #1e1e2e
# background #0f0f0f
# selection_foreground #1e1e2e
# selection_background #f5e0dc

# Cursor
# cursor #f5e0dc
# cursor_text_color #1e1e2e

# URL
# url_color #f5e0dc
url_style curly

# --- COMPORTAMIENTO Y RATÓN ---
# Copiar automáticamente al seleccionar texto
copy_on_select yes
copy_on_select clipboard
# Pegar desde la selección primaria (típico de Linux) con el clic central
# mouse_map middle release ungrabbed paste_from_selection
mouse_map middle press ungrabbed paste_from_primary

# --- ANIMACIÓN DEL CURSOR ---
# Forma de barra (beam) en lugar de bloque
cursor_shape beam
# Parpadeo suave (0 para desactivar, >0 para los segundos del intervalo)
cursor_blink_interval 0.5
# Efecto de rastro/estela al mover el cursor (muy estético)
cursor_trail 1
# Duración de la estela
cursor_trail_decay 0.1 0.4

# BEGIN_KITTY_THEME
# Noctalia
include current-theme.conf
# END_KITTY_THEME
